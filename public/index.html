<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pomum</title>
    <style>
      #screen {
        border: 10px solid gray;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        image-rendering: -moz-crisp-edges;
        width: 400px;
        height: 400px;
      }
    </style>
  </head>
  <body>
    <canvas id="screen" width="10" height="10"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module">
      import renderScreen from "./models/renderScreen.js";
      import createKeyboardLitener from "./models/keyboardListener.js";
      import createGame from "./models/createGame.js";

      const game = createGame();
      const keyboardListener = createKeyboardLitener(document);
      const socket = io();

      socket.on("connect", () => {
        const playerId = socket.id;
        keyboardListener.registerPlayerId(playerId);
        keyboardListener.subscribe(game.movePlayer);

        keyboardListener.subscribe((command) => {
          socket.emit("move-player", command);
        });

        renderScreen(game, playerId);

        console.log(`> Player ${playerId} is connected on client.`);
      });

      socket.on("setup", (state) => {
        game.setState(state);
        console.log(game.state);
      });

      socket.on("add-player", (command) => {
        console.log(`Receiving ${command.type} -> ${command.playerId}`);
        game.addPlayer(command);
      });

      socket.on("remove-player", (command) => {
        console.log(`Receiving ${command.type} -> ${command.playerId}`);
        game.removePlayer(command);
      });

      socket.on("move-player", (command) => {
        console.log(`Receiving ${command.type} -> ${command.playerId}`);

        const playerId = socket.id;
        if (playerId !== command.playerId) game.movePlayer(command);
      });

      socket.on("add-fruit", (command) => {
        console.log(`Receiving ${command.type} -> ${command.fruitId}`);
        game.addFruit(command);
      });

      socket.on("remove-fruit", (command) => {
        console.log(`Receiving ${command.type} -> ${command.fruitId}`);
        game.removeFruit(command);
      });
    </script>
  </body>
</html>
